version: "3.8"

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: kyberbot-chromadb
    ports:
      - "8001:8000"
    volumes:
      - ./data/chromadb:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
      - IS_PERSISTENT=TRUE
    restart: unless-stopped
